nameOverride: ""
fullnameOverride: ""

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

containerPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  SPRING_PROFILES_ACTIVE: dev

secretName: ""

ingress:
  enabled: false
  className: alb
  path: /
  pathType: Prefix
  annotations: {}
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix

livenessProbe:
  path: /actuator/health/liveness
  initialDelaySeconds: 20
  periodSeconds: 15

readinessProbe:
  path: /actuator/health/readiness
  initialDelaySeconds: 20
  periodSeconds: 15
