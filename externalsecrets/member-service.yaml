apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ssd-member-service-secret
  namespace: ssd-dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secretsmanager
  target:
    name: ssd-member-service-secret
  dataFrom:
    - extract:
        key: ssd/dev/member
